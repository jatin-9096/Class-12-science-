name: Inject Shorveer AI Master Secrets

on:
  push:
    branches:
      - main # या आपकी जो भी डिफ़ॉल्ट ब्रांच का नाम है

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Automatically Inject Gemini API Key into ALL Subjects & Pages
      run: |
        # यह जादुई कमांड्स पूरी रिपोजिटरी के हर सब्जेक्ट फोल्डर की सभी .html फाइल्स में चाबी भर देंगी!
        
        # 1. मुख्य पेजों के लिए (अगर बाहर कोई पेज हो)
        sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" *.html || true
        
        # 2. फिजिक्स के सभी नोट्स के लिए
        sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" physics/*.html || true
        
        # 3. केमिस्ट्री के सभी नोट्स के लिए
        sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" chemistry/*.html || true
        
        # 4. मैथमेटिक्स के सभी नोट्स के लिए
        sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" mathematics/*.html || true
        
        # 5. इंग्लिश के सभी नोट्स के लिए
        sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" english/*.html || true

    - name: Deploy Secure Code to GitHub Pages
      uses: maxsam4/git-deploy-action@v1
      with:
        branch: gh-pages
        env:
          ALLOW_EMPTY_COMMITS: true
          
