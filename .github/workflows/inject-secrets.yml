name: Inject Shorveer AI Secrets

on:
  push:
    branches:
      - main # या आपकी जो भी डिफॉल्ट ब्रांच का नाम है

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Automatically Inject Gemini API Key into Notes
      run: |
        # यह कमांड आपकी ch1-long.html फाइल के अंदर जाकर PLACEHOLDER को असली गिटहब सीक्रेट से बदल देगी
        sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" physics/ch1-long.html

    - name: Deploy Secure Code to GitHub Pages
      uses: maxsam4/git-deploy-action@v1
      with:
        branch: gh-pages
        env:
          ALLOW_EMPTY_COMMITS: true
